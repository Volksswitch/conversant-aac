<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAC Conversation Assistant</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>AAC Conversation Assistant</h1>
        <button id="settingsBtn" aria-label="Settings">Settings</button>
    </header>

    <main>
        <section id="transcriptSection" aria-label="Partner speech transcript">
            <h2>Partner said:</h2>
            <div id="transcript" class="panel">
                <p id="transcriptText" class="placeholder">Waiting for partner to speak...</p>
            </div>
            <div id="listenControls">
                <button id="listenBtn">Start Listening</button>
            </div>
        </section>

        <section id="responsesSection" aria-label="Response options">
            <h2>Your response:</h2>
            <div id="responseOptions" class="panel">
                <p class="placeholder">Response options will appear here</p>
            </div>
        </section>

        <section id="statusSection" aria-label="Status">
            <div id="statusBar" class="panel">Ready</div>
        </section>
    </main>

    <dialog id="settingsDialog">
        <h2>Settings</h2>
        <label for="apiKeyInput">Claude API Key</label>
        <input type="text" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
        <div class="dialog-actions">
            <button id="saveSettingsBtn">Save</button>
            <button id="closeSettingsBtn">Cancel</button>
        </div>
    </dialog>

    <script type="module" src="js/app.js"></script>
</body>
</html>
